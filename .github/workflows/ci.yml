name: CI

on:
  push:
    branches:
      - main
      - "phase4/**"
      - "phase5/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    env:
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_ANON_KEY: test-anon-key
      SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test
      ENVIRONMENT: test
      REQUIRE_AUTH: "false"
    steps:
      - name: Notify Vercel
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: "Vercel - soccer-analytics-api: API tests"
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "apps/api/uv.lock"
          python-version: "3.11"
      - run: uv sync --extra dev
      - run: uv run pytest

  web:
    name: Web checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Notify Vercel
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: "Vercel - soccer-analytics-web: Web checks"
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit
      - run: pnpm lint
      - run: pnpm test

  web-build:
    name: Web production build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    env:
      NEXT_PUBLIC_API_URL: https://example.com
      NEXT_PUBLIC_AUTH_ENABLED: "false"
    steps:
      - name: Notify Vercel
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: "Vercel - soccer-analytics-web: production build"
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    steps:
      - name: Notify Vercel
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: "Vercel - soccer-analytics-api: Docker build"
      - name: Notify Vercel (web image)
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: "Vercel - soccer-analytics-web: Docker build"
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          file: apps/api/Dockerfile
          push: false
          tags: soccer-analytics-api:ci
      - name: Build web production image
        uses: docker/build-push-action@v6
        with:
          context: apps/web
          file: apps/web/Dockerfile.prod
          push: false
          tags: soccer-analytics-web:ci
          build-args: |
            NEXT_PUBLIC_API_URL=https://example.com
            NEXT_PUBLIC_AUTH_ENABLED=false

  e2e:
    name: E2E smoke (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Notify Vercel
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: "Vercel - soccer-analytics-web: E2E smoke"
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "apps/api/uv.lock"
          python-version: "3.11"
      - run: uv sync --extra dev
        working-directory: apps/api
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
        env:
          PLAYWRIGHT_API_PORT: "8765"
          PLAYWRIGHT_WEB_PORT: "3456"