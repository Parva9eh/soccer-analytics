# OPTIONAL — Render Blueprint for API (Docker container hosting).
# Primary deploy path is Vercel-only (two projects: apps/api + apps/web).
# See DEPLOY.md. Use this file only if you prefer Render over Vercel for the API.
#
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: soccer-analytics-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: ./apps/api
    plan: free
    healthCheckPath: /health/ready
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LOG_FORMAT
        value: json
      - key: REQUIRE_AUTH
        value: "true"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: SEASON_ZONE_CACHE_TTL_SECONDS
        value: "300"
      - key: USE_ZONE_MATERIALIZED_VIEW
        value: "false"